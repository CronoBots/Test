name: Déploiement GitHub Pages

# Publie le site statique (index.html à la racine) à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch:        # permet aussi un déclenchement manuel

# Droits nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, sans annuler celui en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Empaquetage du site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
